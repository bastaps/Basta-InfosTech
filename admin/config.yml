backend:
  name: github
  repo: bastaps/Basta-InfosTech
  branch: main

media_folder: "img/articles"
public_folder: "/img/articles"

collections:
  - name: "articles"
    label: "Articles"
    folder: "_articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Catégorie", name: "categorie", widget: "select", options: ["Algérie", "Monde", "Tech", "Économie"]}
      - {label: "Contenu", name: "body", widget: "markdown"}
      - {label: "Image", name: "image", widget: "image", required: false}
