{% assign lang = page.lang | default: "fr" %}
{% assign t = site.data.ui[lang] %}
<!DOCTYPE html>
<html lang="{{ lang }}" dir="{% if lang == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | DIGITAL.DZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cairo:wght@400;700;900&display=swap');
        body { font-family: {% if lang == 'ar' %}'Cairo'{% else %}'Inter'{% endif %}, sans-serif; background-color: #f8fafc; color: #1e293b; }
        
        .nav-link { font-weight: 700; color: #64748b; transition: all 0.2s; font-size: 13px; cursor: pointer; text-transform: uppercase; }
        .nav-link:hover { color: #2563eb; }

        /* Effet de zoom sur les images */
        .img-zoom { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .group:hover .img-zoom { transform: scale(1.08); }

        /* Ombre portée sur les titres en overlay */
        .text-shadow-lg { text-shadow: 0 2px 4px rgba(0,0,0,0.9); }

        /* Forcer 3 lignes de texte maximum pour les articles du bas */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- TOPBAR ROUGE -->
    <div class="bg-red-600 text-white py-3 shadow-md">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center font-bold uppercase tracking-wider">
            <!-- Horloge -->
            <div id="live-clock" class="text-[11px] opacity-90 hidden sm:block">...</div>
            
            <div class="flex items-center gap-6">
                <!-- Sélecteur de Langue AGRANDI -->
                <div class="flex items-center bg-white/20 px-4 py-1.5 rounded-full gap-5 text-[13px]">
                    <a href="{{ site.baseurl }}/" class="{% if lang == 'fr' %}text-white underline decoration-2 underline-offset-4{% else %}text-red-100 opacity-70{% endif %} hover:opacity-100 transition">FRANÇAIS</a>
                    <span class="text-white/30">|</span>
                    <a href="{{ site.baseurl }}/ar/" class="{% if lang == 'ar' %}text-white underline decoration-2 underline-offset-4{% else %}text-red-100 opacity-70{% endif %} hover:opacity-100 transition">العربية</a>
                </div>

                <!-- Réseaux Sociaux -->
                <div class="flex gap-4 border-l border-white/20 pl-6">
                    <a href="#" class="text-white hover:scale-110 transition"><i class="fab fa-linkedin text-lg"></i></a>
                    <a href="#" class="text-white hover:scale-110 transition"><i class="fab fa-facebook text-lg"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- HEADER LOGO -->
    <header class="bg-white py-8 border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 flex flex-col items-center">
            <a href="{% if lang == 'ar' %}{{ site.baseurl }}/ar/{% else %}{{ site.baseurl }}/{% endif %}" class="text-5xl font-black tracking-tighter text-slate-900 mb-6">
                DIGITAL<span class="text-blue-600">.DZ</span>
            </a>
            <div class="relative w-full max-w-md">
                <input type="text" id="searchInput" onkeyup="searchArticles()" placeholder="{{ t.search_placeholder }}" 
                class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-400/20 focus:border-blue-400 text-slate-900 transition-all">
                <i class="fas fa-search absolute {% if lang == 'ar' %}left-4{% else %}right-4{% endif %} top-3.5 text-slate-300 text-xs"></i>
            </div>
        </div>
    </header>

    <!-- NAVIGATION MENU -->
    <nav class="sticky top-0 bg-white/95 backdrop-blur-md shadow-sm z-50 border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 overflow-x-auto">
            <div class="flex gap-10 py-4 justify-center whitespace-nowrap tracking-widest font-extrabold text-[12px]">
