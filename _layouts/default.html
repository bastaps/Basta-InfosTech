{% assign lang = page.lang | default: "fr" %}
{% assign t = site.data.ui[lang] %}
<!DOCTYPE html>
<html lang="{{ lang }}" dir="{% if lang == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | DIGITAL.DZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Cairo:wght@400;700;900&display=swap');
        body { font-family: {% if lang == 'ar' %}'Cairo'{% else %}'Inter'{% endif %}, sans-serif; background-color: #f8fafc; color: #1e293b; }
        .nav-link { font-weight: 700; color: #64748b; transition: all 0.2s; font-size: 13px; cursor: pointer; text-transform: uppercase; }
        .nav-link:hover { color: #2563eb; }

        /* Effet d'ombre douce pour les titres sur images */
        .text-shadow-sm {
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        
        /* Transition pour les survols d'images */
        .img-zoom {
            transition: transform 0.5s ease;
        }
        .img-zoom:hover {
            transform: scale(1.05);
        }

        /* Style pour les articles sans images sous la une */
        .article-text-only {
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .article-text-only:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <!-- Topbar (Compacte) -->
    <div class="bg-slate-900 text-white py-2">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center text-[11px] font-bold uppercase tracking-wider">
            <div id="live-clock" class="text-slate-400">...</div>
            <div class="flex items-center gap-6">
                <div class="flex items-center bg-slate-800 px-2 py-0.5 rounded gap-2">
                    <a href="{{ site.baseurl }}/" class="{% if lang == 'fr' %}text-blue-400{% else %}text-slate-400{% endif %} hover:text-white transition">FR</a>
                    <span class="text-slate-600">|</span>
                    <a href="{{ site.baseurl }}/ar/" class="{% if lang == 'ar' %}text-blue-400{% else %}text-slate-400{% endif %} hover:text-white transition">AR</a>
                </div>
                <a href="mailto:contact@basta-infostech.dz" class="hover:text-blue-400">CONTACT</a>
                <div class="flex gap-3 border-l border-slate-700 pl-4">
                    <a href="#" class="hover:text-blue-400"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="hover:text-blue-600"><i class="fab fa-facebook"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Header Logo (Redimensionné et aéré) -->
    <header class="bg-white py-6 border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 flex flex-col items-center">
            <a href="{% if lang == 'ar' %}{{ site.baseurl }}/ar/{% else %}{{ site.baseurl }}/{% endif %}" class="text-4xl font-black tracking-tighter text-slate-900 mb-4">
                DIGITAL<span class="text-blue-600">.DZ</span>
            </a>
            <div class="relative w-full max-w-sm">
                <input type="text" id="searchInput" onkeyup="searchArticles()" placeholder="{{ t.search_placeholder }}" 
                class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-1.5 text-sm outline-none focus:border-blue-400 text-slate-900">
                <i class="fas fa-search absolute {% if lang == 'ar' %}left-3{% else %}right-3{% endif %} top-2.5 text-slate-300 text-xs"></i>
            </div>
        </div>
    </header>

    <!-- Menu (Plus fin) -->
    <nav class="sticky top-0 bg-white/95 backdrop-blur-sm shadow-sm z-50 border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-4 overflow-x-auto">
            <div class="flex gap-8 py-3 justify-center whitespace-nowrap tracking-wide font-bold">
                <a href="{% if lang == 'ar' %}{{ site.baseurl }}/ar/{% else %}{{ site.baseurl }}/{% endif %}" class="nav-link">{{ t.news }}</a>
                <button onclick="filterByCat('National')" class="nav-link">{{ t.algeria }}</button>
                <button onclick="filterByCat('Tech')" class="nav-link">{{ t.tech }}</button>
                <button onclick="filterByCat('Mobile')" class="nav-link">{{ t.mobile }}</button>
                <button onclick="filterByCat('Economie')" class="nav-link">{{ t.eco }}</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        {{ content }}
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            const locale = ("{{ lang }}" === 'ar') ? 'ar-DZ' : 'fr-FR';
            document.getElementById('live-clock').innerHTML = now.toLocaleDateString(locale, { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
        }
        setInterval(updateClock, 1000); updateClock();

        function searchArticles() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.searchable-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(input) ? "block" : "none";
            });
        }

        function filterByCat(cat) {
            if (window.location.pathname.includes('/202')) {
                window.location.href = ("{{ lang }}" === 'ar') ? "{{ site.baseurl }}/ar/" : "{{ site.baseurl }}/";
            } else {
                document.querySelectorAll('.searchable-item').forEach(el => {
                    el.style.display = (el.getAttribute('data-category') === cat) ? "block" : "none";
                });
            }
        }
    </script>
</body>
</html>
