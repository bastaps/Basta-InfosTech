{% assign lang = page.lang | default: "fr" %}
<!DOCTYPE html>
<html lang="{{ lang }}" dir="{% if lang == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGITAL.DZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Cairo:wght@400;700;900&display=swap');
        body { font-family: {% if lang == 'ar' %}'Cairo'{% else %}'Inter'{% endif %}, sans-serif; background-color: #fcfcfc; color: #1e293b; }
        .nav-link { font-weight: 800; color: #475569; font-size: 13px; text-transform: uppercase; cursor: pointer; }
        .nav-link:hover { color: #2563eb; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <!-- TOPBAR ROUGE -->
    <div class="bg-red-600 text-white py-3 shadow-md">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center font-bold">
            <div id="live-clock" class="text-[11px] uppercase tracking-wider">...</div>
            <div class="flex items-center gap-6">
                <div class="flex items-center bg-white/20 px-4 py-1.5 rounded-full gap-5 text-[12px]">
                    <a href="{{ site.baseurl }}/" class="hover:text-white {% if lang == 'fr' %}text-white underline underline-offset-4{% else %}text-red-100 opacity-70{% endif %}">FRANÇAIS</a>
                    <span class="opacity-30">|</span>
                    <a href="{{ site.baseurl }}/ar/" class="hover:text-white {% if lang == 'ar' %}text-white underline underline-offset-4{% else %}text-red-100 opacity-70{% endif %}">العربية</a>
                </div>
                <div class="flex gap-4">
                    <a href="#" class="text-white hover:opacity-80"><i class="fab fa-linkedin text-lg"></i></a>
                    <a href="#" class="text-white hover:opacity-80"><i class="fab fa-facebook text-lg"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGO -->
    <header class="py-10">
        <div class="max-w-6xl mx-auto px-4 flex flex-col items-center">
            <a href="{% if lang == 'ar' %}{{ site.baseurl }}/ar/{% else %}{{ site.baseurl }}/{% endif %}" class="text-5xl font-black tracking-tighter text-slate-900 mb-6">
                DIGITAL<span class="text-blue-600">.DZ</span>
            </a>
            <div class="relative w-full max-w-md">
                <input type="text" id="searchInput" onkeyup="searchArticles()" placeholder="Rechercher..." class="w-full bg-slate-50 border border-slate-200 rounded-full px-5 py-2 text-sm outline-none focus:border-blue-400">
            </div>
        </div>
    </header>

    <!-- MENU -->
    <nav class="sticky top-0 bg-white/95 backdrop-blur-sm shadow-sm z-50 border-y border-slate-100 mb-8">
        <div class="max-w-6xl mx-auto px-4 flex gap-8 py-4 justify-center overflow-x-auto whitespace-nowrap font-bold">
            <a href="{% if lang == 'ar' %}{{ site.baseurl }}/ar/{% else %}{{ site.baseurl }}/{% endif %}" class="nav-link">ACTUALITÉS</a>
            <button onclick="filterByCat('National')" class="nav-link">ALGÉRIE</button>
            <button onclick="filterByCat('Tech')" class="nav-link">TECH</button>
            <button onclick="filterByCat('Economie')" class="nav-link">ÉCONOMIE</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        {{ content }}
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            const locale = "{{ lang }}" === 'ar' ? 'ar-DZ' : 'fr-FR';
            document.getElementById('live-clock').innerHTML = now.toLocaleDateString(locale, {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
        }
        updateClock(); setInterval(updateClock, 1000);
        function searchArticles() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.searchable-item').forEach(el => {
                el.style.display = el.innerText.toLowerCase().includes(input) ? "block" : "none";
            });
        }
        function filterByCat(cat) {
            document.querySelectorAll('.searchable-item').forEach(el => {
                el.style.display = (el.getAttribute('data-category') === cat) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
