---
layout: default
---
<article class="max-w-4xl mx-auto bg-white p-6 md:p-12 rounded-2xl shadow-sm">
    <span class="text-blue-600 font-bold uppercase text-xs tracking-widest mb-4 block">{{ page.category }}</span>
    <h1 class="text-3xl md:text-5xl font-black text-slate-900 leading-tight mb-6">{{ page.title }}</h1>
    
    <div class="flex items-center text-slate-400 text-xs mb-8 border-b pb-6">
        <span class="mr-6"><i class="far fa-calendar-alt mr-2"></i> {{ page.date | date: "%d/%m/%Y" }}</span>
        <span><i class="far fa-clock mr-2"></i> Lecture 3 min</span>
    </div>

    {% if page.image %}
    <img src="{{ page.image | relative_url }}" class="w-full h-auto rounded-xl mb-10 shadow-lg" alt="{{ page.title }}">
    {% endif %}

    <div class="prose prose-slate prose-lg max-w-none text-slate-700 leading-relaxed">
        {{ content }}
    </div>
</article>
