---
# Layout article
---
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | DIGITAL.DZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; }
        .tsa-red { color: #E30613; }
        .article-content p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.15rem; color: #333; }
        .article-content h2 { font-size: 1.8rem; font-weight: 900; margin-top: 2rem; color: #000; }
    </style>
</head>
<body>
    <nav class="bg-white border-b border-gray-200 py-4 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="{{ '/' | relative_url }}" class="text-2xl font-black uppercase">DIGITAL<span class="tsa-red">.DZ</span></a>
            <div class="flex space-x-4 text-gray-400">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-x-twitter"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto max-w-4xl px-4 py-12">
        <span class="tsa-red font-black uppercase text-xs">{{ page.category }}</span>
        <h1 class="text-4xl md:text-5xl font-black mt-4 mb-8 leading-tight">{{ page.title }}</h1>
        <img src="{{ page.image | relative_url }}" class="w-full rounded mb-10 shadow-lg">
        <div class="article-content">
            {{ content }}
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-10 text-center uppercase text-[10px] font-bold tracking-widest">
        © 2026 DIGITAL.DZ • TOUS DROITS RÉSERVÉS
    </footer>
</body>
</html>
