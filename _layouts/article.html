---
# Layout article
---
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | DIGITAL.DZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #f6f6f6; }
        .tsa-red { color: #E30613; }
        .article-content p { margin-bottom: 1.5rem; line-height: 1.8; font-size: 1.15rem; color: #333; }
        .article-content h2 { font-size: 1.8rem; font-weight: 900; margin-top: 2rem; color: #000; }
    </style>
</head>
<body>
    <!-- TOP BAR (Identique Accueil) -->
    <div class="bg-white border-b border-gray-200 py-1.5 text-[10px] font-bold text-gray-400 uppercase">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div>Alger, le {{ "now" | date: "%d %B %Y" }}</div>
            <div class="flex space-x-4 text-gray-400">
                <a href="#" class="hover:tsa-red"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:tsa-red"><i class="fab fa-x-twitter"></i></a>
                <a href="#" class="hover:tsa-red"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </div>

    <!-- LOGO HEADER (Identique Accueil) -->
    <header class="bg-white py-4 border-b border-gray-100">
        <div class="container mx-auto px-4 text-center">
            <a href="{{ '/' | relative_url }}" class="text-4xl md:text-5xl font-black tracking-tighter uppercase">
                DIGITAL<span class="tsa-red">.DZ</span>
            </a>
        </div>
    </header>

    <!-- NAVIGATION (Identique Accueil) -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-200 uppercase font-black text-[11px] tracking-widest">
        <div class="container mx-auto px-4 flex justify-center space-x-6 py-3 overflow-x-auto whitespace-nowrap">
            <a href="{{ '/' | relative_url }}" class="hover:tsa-red transition">À la une</a>
            <a href="#" class="hover:tsa-red transition">Algérie</a>
            <a href="#" class="hover:tsa-red transition">International</a>
            <a href="#" class="hover:tsa-red transition">Souveraineté</a>
        </div>
    </nav>

    <main class="container mx-auto max-w-4xl px-4 py-8 bg-white mt-4 shadow-sm">
        <span class="tsa-red font-black uppercase text-xs">{{ page.category }}</span>
        <h1 class="text-3xl md:text-5xl font-black mt-2 mb-6 leading-tight">{{ page.title }}</h1>
        <img src="{{ page.image | relative_url }}" class="w-full mb-8 shadow-md">
        <div class="article-content">
            {{ content }}
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-10 mt-12 text-center uppercase text-[10px] font-bold tracking-widest">
        © 2026 DIGITAL.DZ • TOUS DROITS RÉSERVÉS
    </footer>
</body>
</html>
