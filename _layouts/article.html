---
# Layout autonome épuré
---
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | DIGITAL.DZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; line-height: 1.7; color: #333; }
        .article-body p { margin-bottom: 1.5rem; font-size: 1.1rem; }
        .article-body h2 { font-weight: 800; font-size: 1.8rem; margin-top: 2.5rem; color: #1a1a1a; }
    </style>
</head>
<body class="bg-white">

    <nav class="border-b border-gray-100 py-6">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="{{ site.baseurl }}/" class="text-2xl font-extrabold tracking-tighter">DIGITAL<span class="text-blue-600">.DZ</span></a>
            <a href="{{ site.baseurl }}/" class="text-xs font-bold text-gray-400 hover:text-blue-600 uppercase">Accueil</a>
        </div>
    </nav>

    <article class="max-w-3xl mx-auto px-4 py-12">
        <span class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-4 block">{{ page.category }}</span>
        <h1 class="text-3xl md:text-5xl font-extrabold text-gray-900 leading-tight mb-8">{{ page.title }}</h1>
        
        <div class="flex items-center text-sm text-gray-400 border-b border-gray-100 pb-8 mb-10 font-medium">
            <span class="mr-4">Par La Rédaction</span>
            <span class="mr-4">•</span>
            <span>{{ page.date | date: "%d/%m/%Y à %H:%M" }}</span>
        </div>

        {% if page.image %}
        <img src="{{ page.image | relative_url }}" class="w-full rounded-xl shadow-sm mb-12">
        {% endif %}

        <div class="article-body">
            {{ content }}
        </div>
    </article>

    <footer class="bg-gray-50 py-12 mt-20 border-t border-gray-100 text-center">
        <p class="text-xs text-gray-400 font-bold uppercase tracking-[0.3em]">© DIGITAL.DZ</p>
    </footer>

</body>
</html>
